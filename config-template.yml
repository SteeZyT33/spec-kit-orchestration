# Orchestration Extension Configuration
# Generated by: specify ext add orchestration

# ── Review settings ───────────────────────────────────────────────────────────
review:
  # Security pass triggers automatically when spec mentions auth/payment/PII.
  # Set to true to always run security pass.
  force_security: false

  # Tiered fix behavior: auto-fix trivial issues, suggest medium, flag complex.
  auto_fix: true

# ── Cross-review settings ─────────────────────────────────────────────────────
crossreview:
  # Canonical reviewer agent for adversarial review.
  # Set to null to auto-select an installed Tier 1 agent that differs from the active provider when possible.
  agent: null

  # Legacy alias accepted during the migration window.
  # If both are set, crossreview.agent wins.
  harness: null

  # Model override (null = agent default)
  model: null

  # Reasoning effort level
  effort: "high"

  # Reserved for ambiguity escalation (not yet implemented).
  # The backend is currently deterministic and does not prompt for input here.
  ask_on_ambiguous: true

  # Advisory memory gate for prior successful reviewers.
  # Only takes effect when reviewer memory is supplied via ENV_LAST_SUCCESS_KEYS.
  remember_last_success: true

# ── Review exclusions ─────────────────────────────────────────────────────────
# Paths matching these patterns are auto-rejected during PR comment processing.
# Format: glob pattern — reason
exclusions:
  - ".specify/scripts/*"    # vendor code, upstream responsibility
  - ".specify/templates/*"  # upstream templates

# ── Capability packs ──────────────────────────────────────────────────────────
# Orca capability-pack overrides live in a repo-local JSON manifest:
#   .specify/orca/capability-packs.json
# Create it with:
#   uv run python -m speckit_orca.capability_packs scaffold --root .
# Inspect the effective pack state with:
#   uv run python -m speckit_orca.capability_packs list --root .
