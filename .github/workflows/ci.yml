name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "001-*"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: |
          python -m py_compile src/orca/cli.py
          python -m py_compile scripts/bash/crossreview-backend.py

      - name: Validate shell syntax
        run: |
          bash -n orca
          bash -n src/orca/assets/orca.sh
          bash -n src/orca/assets/orca-main.sh
          bash -n scripts/bash/crossreview.sh
          bash -n scripts/bash/resolve-pr-threads.sh
          bash -n scripts/bash/orca-worktree-lib.sh
          bash -n scripts/bash/orca-worktree.sh

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Validate capability schemas
        run: python -m pytest tests/cli/test_schema_validation.py -v

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build

  release-script-tests:
    runs-on: ubuntu-latest
    # Always run: tests are deterministic, ~5s, and the prior `if:` clause
    # used `github.event.pull_request.changed_files` which doesn't exist in
    # the event payload — caused the job to skip on every PR.
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for tag scanning

      - name: Run release-script integration tests
        run: |
          chmod +x scripts/release.sh
          chmod +x tests/scripts/fixtures/*.sh
          bash tests/scripts/test_release.sh
