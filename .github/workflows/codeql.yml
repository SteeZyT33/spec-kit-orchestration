name: CodeQL

# NOTE: pull_request and push triggers temporarily disabled while we work
# around a GitHub Actions runner issue: after the repo rename
# (orca <-> spec-kit-orca), CodeQL's pre-finalize.sh picks up a stale
# `/home/runner/work/spec-kit-orca/spec-kit-orca` path while the rest of
# the pipeline uses the canonical `/home/runner/work/orca/orca`, failing
# with "Invalid working directory". Weekly scheduled runs still produce
# security alerts so coverage is not lost; PR velocity is unblocked.
# Revert this when the rename redirect settles or the runner image ships
# a fix. See PR #62 CI logs for the failure shape.
on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Pin source root so the repo-rename redirect does not let
          # CodeQL tooling pick up a stale path internally.
          source-root: ${{ github.workspace }}

      # Autobuild removed: not needed for Python, and it was choosing
      # a stale `/home/runner/work/orca/orca` path left over from before
      # the repo was renamed, which caused pre-finalize to fail on
      # "Invalid working directory".

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          checkout_path: ${{ github.workspace }}
