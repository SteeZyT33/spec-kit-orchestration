schema_version: "1.0"

extension:
  id: "orchestration"
  name: "Orchestration — Review, Assign & Cross-Review"
  version: "1.0.0"
  description: "Spec-compliant code review with tiered fixes, agent-to-task assignment, and cross-harness adversarial review."
  author: "SteeZyT33"
  repository: "https://github.com/SteeZyT33/spec-kit-orchestration"
  license: "MIT"
  homepage: "https://github.com/SteeZyT33/spec-kit-orchestration"

requires:
  speckit_version: ">=0.5.0"

provides:
  commands:
    - name: "speckit.review"
      file: "commands/review.md"
      description: "Post-implementation review: spec compliance, code quality, security, tiered fixes, phase PRs, and GitHub comment management."

    - name: "speckit.assign"
      file: "commands/assign.md"
      description: "Assign best-fit agents to tasks based on capabilities, context detection, and confidence scoring."

    - name: "speckit.crossreview"
      file: "commands/crossreview.md"
      description: "Cross-harness adversarial review using a different AI model for independent validation."

  config:
    - name: "review-config.yml"
      template: "config-template.yml"
      description: "Review and cross-review configuration (harness, model, effort, exclusions)"
      required: false

hooks:
  after_implement:
    command: "speckit.review"
    optional: true
    prompt: "Run post-implementation review?"
    description: "Optionally start review after implementation completes"

  after_review:
    command: "speckit.crossreview"
    optional: true
    prompt: "Run cross-harness adversarial review?"
    description: "Optionally validate with a different AI harness after review"

tags:
  - "review"
  - "orchestration"
  - "multi-agent"
  - "quality"
  - "cross-harness"
