schema_version: "1.0"

extension:
  id: "orca"
  name: "Orchestration — Review, Assign, Cross-Review & Self-Review"
  version: "1.2.0"
  description: "Spec-compliant code review with tiered fixes, agent assignment, cross-harness adversarial review, and process self-improvement."
  author: "SteeZyT33"
  repository: "https://github.com/SteeZyT33/spec-kit-orchestration"
  license: "MIT"
  homepage: "https://github.com/SteeZyT33/spec-kit-orchestration"

requires:
  speckit_version: ">=0.5.0"

provides:
  commands:
    - name: "speckit.orca.review"
      file: "commands/review.md"
      description: "Post-implementation review: spec compliance, code quality, security, tiered fixes, phase PRs, and GitHub comment management."

    - name: "speckit.orca.assign"
      file: "commands/assign.md"
      description: "Assign best-fit agents to tasks based on capabilities, context detection, and confidence scoring."

    - name: "speckit.orca.crossreview"
      file: "commands/crossreview.md"
      description: "Cross-harness adversarial review using a different AI model for independent validation."

    - name: "speckit.orca.self-review"
      file: "commands/self-review.md"
      description: "Process retrospective that evaluates workflow effectiveness and dispatches agents to improve extension commands."

  config:
    - name: "orca-config.yml"
      template: "config-template.yml"
      description: "Review, cross-review, and self-review configuration"
      required: false

hooks:
  after_implement:
    command: "speckit.orca.review"
    optional: true
    prompt: "Run post-implementation review?"
    description: "Optionally start review after implementation completes"

  after_review:
    command: "speckit.orca.crossreview"
    optional: true
    prompt: "Run cross-harness adversarial review?"
    description: "Optionally validate with a different AI harness after review"

# Companion extensions installed by the bootstrap script.
# These are NOT dependencies — the orca extension works without them.
# They complement the workflow when present.
companions:
  - id: "superb"
    why: "TDD enforcement, superpowers-based verification gates, and debug escalation protocol"
  - id: "verify"
    why: "Evidence-based completion validation — complements review by gating task completion"
  - id: "reconcile"
    why: "Drift detection between spec and implementation — feeds into crossreview findings"
  - id: "status"
    why: "Workflow progress dashboard — shows where you are in the SDD lifecycle"

tags:
  - "review"
  - "orca"
  - "multi-agent"
  - "quality"
  - "cross-harness"
  - "self-improvement"
